name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify production build
        shell: bash
        run: |
          grep -q '/discowurd/assets/' dist/index.html
          ! grep -q '/src/styles.css' dist/index.html

      - name: Copy build to docs
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

      - name: Commit docs folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'deploy: update GitHub Pages build'
          file_pattern: docs/**
